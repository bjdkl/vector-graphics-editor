spring.application.name=vector-editor-backend

# 服务端口
server.port=8080
server.servlet.context-path=/api

# MySQL 数据库
spring.datasource.url=jdbc:mysql://localhost:3306/vectoreditor?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123456

# HikariCP 连接池（生产推荐）
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA（ddl-auto=none，表已手动创建）
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# 文件上传
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# JWT 密钥（生产环境请替换为强随机串）
app.jwt.secret=VectorEditorSecretKey2024VectorEditorSecretKey2024VectorEditorKey
app.jwt.expiration=86400000
